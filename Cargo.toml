[package]
name = "deterministic_wave_engine"
version = "0.1.0"
edition = "2021"
default-run = "deterministic_wave_engine"

[dependencies]
wgpu = "0.19"
bytemuck = { version = "1.15", features = ["derive"] }
pollster = "0.3"
flume = "0.11"

[[bin]]
name = "deterministic_wave_engine"
path = "src/main.rs"

[[bin]]
name = "hqpu"
path = "src/hqpu.rs"